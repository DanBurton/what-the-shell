<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>what-the-shell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: "Courier New", Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      margin-bottom: 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      color: #58a6ff;
      letter-spacing: 0.05em;
    }

    header p {
      margin-top: 0.5rem;
      color: #8b949e;
      font-size: 0.9rem;
    }

    .terminal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      width: 100%;
      max-width: 720px;
      padding: 1.5rem;
    }

    .prompt-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .prompt-sign {
      color: #3fb950;
      font-size: 1.1rem;
      user-select: none;
    }

    #command-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e6edf3;
      font-family: inherit;
      font-size: 1rem;
      caret-color: #58a6ff;
    }

    #command-input::placeholder {
      color: #484f58;
    }

    .btn-row {
      margin-top: 1rem;
      display: flex;
      gap: 0.75rem;
    }

    button {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: #30363d;
      border-color: #8b949e;
    }

    button#explain-btn {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }

    button#explain-btn:hover {
      background: #388bfd;
      border-color: #388bfd;
    }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 1.25rem 0;
    }

    #output {
      min-height: 4rem;
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #output.empty {
      color: #484f58;
    }

    #output .cmd-name {
      color: #58a6ff;
      font-weight: bold;
    }

    #output .unknown {
      color: #f85149;
    }

    #output .args-header {
      color: #8b949e;
      font-size: 0.85em;
    }

    #output .arg-flag {
      color: #3fb950;
      font-weight: bold;
      display: inline-block;
      min-width: 12ch;
    }

    footer {
      margin-top: 3rem;
      color: #484f58;
      font-size: 0.8rem;
      text-align: center;
    }

    /* ---- AI section ---- */
    .ai-label {
      color: #a371f7;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .model-note {
      color: #484f58;
      font-size: 0.75rem;
      margin-bottom: 0.75rem;
    }

    button#ai-explain-btn {
      background: #6e40c9;
      border-color: #6e40c9;
      color: #fff;
    }

    button#ai-explain-btn:hover:not(:disabled) {
      background: #8957e5;
      border-color: #8957e5;
    }

    button#ai-explain-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .progress-wrap {
      background: #21262d;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin: 0.75rem 0 0.4rem;
      display: none;
    }

    .progress-wrap.visible {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6e40c9, #a371f7);
      width: 0%;
      transition: width 0.25s ease;
      border-radius: 4px;
    }

    #ai-status {
      color: #8b949e;
      font-size: 0.8rem;
      min-height: 1.2em;
      margin-bottom: 0.5rem;
      white-space: pre-wrap;
    }

    #ai-output {
      min-height: 4rem;
      font-size: 0.95rem;
      line-height: 1.6;
      word-break: break-word;
    }

    #ai-output p { margin: 0 0 0.6em; }
    #ai-output p:last-child { margin-bottom: 0; }
    #ai-output code {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 0.1em 0.35em;
      font-family: "Fira Mono", "Cascadia Code", monospace;
      font-size: 0.9em;
    }
    #ai-output pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.75em 1em;
      overflow-x: auto;
    }
    #ai-output pre code {
      background: none;
      border: none;
      padding: 0;
    }
    #ai-output ul, #ai-output ol { padding-left: 1.5em; margin: 0 0 0.6em; }
    #ai-output li { margin-bottom: 0.25em; }

    #ai-output.empty {
      color: #484f58;
    }

    #ai-output.error {
      color: #f85149;
    }
  </style>
</head>
<body>
  <header>
    <h1>what-the-shell</h1>
    <p>Paste or type a shell command to get a plain-English explanation.</p>
  </header>

  <div class="terminal">
    <div class="prompt-row">
      <span class="prompt-sign">$</span>
      <input
        id="command-input"
        type="text"
        placeholder="ls -la /home/user"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="btn-row">
      <button id="explain-btn" type="button">Explain</button>
      <button id="clear-btn" type="button">Clear</button>
    </div>

    <hr class="divider" />

    <div id="output" class="empty">Your explanation will appear here.</div>

    <hr class="divider" />

    <div class="ai-label">🤖 AI Explanation</div>
    <p class="model-note">Runs entirely in your browser · model (~700 MB) is downloaded once and cached locally</p>

    <div class="btn-row">
      <button id="ai-explain-btn" type="button">AI Explain</button>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="ai-status"></div>

    <div id="ai-output" class="empty">AI explanation will appear here.</div>
  </div>

  <footer>
    <a href="https://github.com/DanBurton/what-the-shell" style="color:inherit;">
      github.com/DanBurton/what-the-shell
    </a>
  </footer>

    // ---------------------------------------------------------------------------
    // Command data (loaded from data files derived from man pages)
    // To add support for a new command: create data/<cmd>.json and add the
    // command name to COMMANDS_WITH_DATA below.
    // ---------------------------------------------------------------------------

    /** Commands that have a corresponding data file in data/<cmd>.json. */
    let COMMANDS_WITH_DATA = new Set();

    /** Resolves when commands.json has been loaded. */
    const commandsReady = fetch("data/commands.json")
      .then(r => r.ok ? r.json() : [])
      .catch(() => [])
      .then(list => { COMMANDS_WITH_DATA = new Set(list); });

    /** Cache for loaded command data (null = not available or failed to load). */
    const commandDataCache = new Map();

    /**
     * Async-load the data file for a command.
     * Returns the parsed JSON object on success, or null on failure.
     * Falls back gracefully if the file is absent or the fetch fails.
     */
    async function loadCommandData(cmd) {
      await commandsReady;
      if (commandDataCache.has(cmd)) return commandDataCache.get(cmd);
      if (!COMMANDS_WITH_DATA.has(cmd)) {
        commandDataCache.set(cmd, null);
        return null;
      }
      try {
        const resp = await fetch(`data/${cmd}.json`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        commandDataCache.set(cmd, data);
        return data;
      } catch (_) {
        commandDataCache.set(cmd, null);
        return null;
      }
    }

    // ---------------------------------------------------------------------------
    // Helpers
    // ---------------------------------------------------------------------------

    /**
     * Parse a command-line string into its component parts.
     * Returns { command, flags, positionals } or null if the input is empty.
     *
     * Handles:
     *   - Leading "sudo" (stripped before identifying the command)
     *   - Short flag clusters  (-la  →  -l, -a)
     *   - Long flags           (--all, --color=always  →  --all, --color)
     *   - End-of-flags marker  (--)
     *   - Bare shell operators (|, >, &&, etc.)
     */
    function parseCommandLine(input) {
      const trimmed = input.trim();
      if (!trimmed) return null;

      // Handle bare shell operators entered on their own
      for (const op of ["|", ">", ">>", "<", "2>", "&&", "||", "&", ";"]) {
        if (trimmed === op) return { command: op, flags: [], positionals: [] };
      }

      const tokens = trimmed.split(/\s+/);
      let cmdIdx = 0;

      // Strip leading "sudo"
      if (tokens[0].toLowerCase() === "sudo" && tokens.length > 1) {
        cmdIdx = 1;
      }

      const command = tokens[cmdIdx].toLowerCase();
      const flags = [];
      const positionals = [];
      let endOfFlags = false;

      for (let i = cmdIdx + 1; i < tokens.length; i++) {
        const t = tokens[i];
        if (endOfFlags) {
          positionals.push(t);
        } else if (t === "--") {
          endOfFlags = true;
        } else if (t.startsWith("--")) {
          // Long flag — strip =value if present (e.g. --color=always → --color)
          const eqIdx = t.indexOf("=");
          flags.push(eqIdx !== -1 ? t.slice(0, eqIdx) : t);
        } else if (t.startsWith("-") && t.length > 1) {
          const chars = t.slice(1);
          if (chars.length === 1) {
            // Single short flag: -l, -a, -1
            flags.push(t);
          } else if (/^[a-zA-Z]+$/.test(chars)) {
            // Pure-alpha cluster: -la → -l, -a
            for (const ch of chars) {
              flags.push(`-${ch}`);
            }
          }
          // Mixed alpha-numeric (e.g. -w80): skip — the attached value isn't a flag
        } else {
          positionals.push(t);
        }
      }

      return { command, flags, positionals };
    }

    /** Build the HTML explanation for a command string (async for data-file lookup). */
    async function explain(rawInput) {
      const parsed = parseCommandLine(rawInput);
      if (!parsed) return null;

      const { command, flags } = parsed;
      const description = COMMANDS[command];

      if (!description) {
        return `<span class="unknown">Unknown command: <strong>${escHtml(command)}</strong></span>\nNo explanation available yet. Try a common Unix command.`;
      }

      let html = `<span class="cmd-name">${escHtml(command)}</span>\n${escHtml(description)}`;

      // When the command has flags and a data file, annotate each recognized flag.
      if (flags.length > 0) {
        const data = await loadCommandData(command);
        if (data && data.options) {
          const argLines = [];
          // Deduplicate flags while preserving order
          const seen = new Set();
          for (const flag of flags) {
            if (seen.has(flag)) continue;
            seen.add(flag);
            const desc = data.options[flag];
            if (desc) {
              argLines.push(
                `  <span class="arg-flag">${escHtml(flag)}</span>  ${escHtml(desc)}`
              );
            }
            // Silently skip flags not found in the data file (graceful fallback)
          }
          if (argLines.length > 0) {
            html += `\n\n<span class="args-header">Arguments:</span>\n${argLines.join("\n")}`;
          }
        }
      }

      return html;
    }

    function escHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ---------------------------------------------------------------------------
    // UI wiring
    // ---------------------------------------------------------------------------

    const input     = document.getElementById("command-input");
    const output    = document.getElementById("output");
    const explainBtn = document.getElementById("explain-btn");
    const clearBtn  = document.getElementById("clear-btn");

    async function runExplain() {
      const html = await explain(input.value);
      if (!html) {
        output.className = "empty";
        output.innerHTML = "Your explanation will appear here.";
        return;
      }
      output.className = "";
      output.innerHTML = html;
    }

    explainBtn.addEventListener("click", runExplain);

    clearBtn.addEventListener("click", () => {
      input.value = "";
      output.className = "empty";
      output.innerHTML = "Your explanation will appear here.";
      input.focus();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runExplain();
    });
  </script>

  <script type="module">

    const AI_MODEL = "Llama-3.2-1B-Instruct-q4f16_1-MLC";

    let engine = null;

    const commandInput  = document.getElementById("command-input");

    const aiOutput      = document.getElementById("ai-output");

    function setStatus(text) {

    }

    function showProgress(fraction, text) {
      progressWrap.classList.add("visible");
      progressFill.style.width = `${Math.min(Math.round(fraction * 100), 100)}%`;
      if (text) setStatus(text);
    }

    function hideProgress() {
      progressWrap.classList.remove("visible");
      progressFill.style.width = "0%";
    }

    async function ensureEngine() {
      if (engine) return engine;

      // If another call is already loading, wait for it to finish.
      if (engineInitializing) {
        await new Promise(resolve => {
          const id = setInterval(() => {
            if (!engineInitializing) { clearInterval(id); resolve(); }
          }, 250);
        });
        return engine;
      }

      engineInitializing = true;
      setStatus("Loading AI model… (first load downloads ~700 MB, then cached)");

      try {
        engine = await webllm.CreateMLCEngine(AI_MODEL, {
          initProgressCallback: ({ progress, text }) => {
            showProgress(progress, text);
          },
        });
        hideProgress();
        setStatus("Model ready.");
        setTimeout(() => { if (aiStatus.textContent === "Model ready.") setStatus(""); }, 2500);
      } catch (err) {
        engineInitializing = false;
        throw err;
      }

      engineInitializing = false;
      return engine;
    }

    async function runAiExplain() {
      const command = commandInput.value.trim();
      if (!command) return;

      aiExplainBtn.disabled = true;
      aiOutput.className = "";
      aiOutput.textContent = "";

      try {
        const eng = await ensureEngine();

        setStatus("Generating…");
        const startTime = performance.now();
        let chunkCount = 0;

        const stream = await eng.chat.completions.create({
          messages: [
            {
              role: "system",
              content: "You are a concise shell command explainer. Explain what the given shell command does in plain English. Be brief and clear.",
            },
            {
              role: "user",
              content: `Explain this shell command:\n\n${command}`,
            },
          ],
          stream: true,
          temperature: 0.3,
          max_tokens: 256,
        });

        let accumulated = "";
        for await (const chunk of stream) {
          const delta = chunk.choices[0]?.delta?.content ?? "";
          if (delta) {
            accumulated += delta;
            aiOutput.innerHTML = DOMPurify.sanitize(marked.parse(accumulated));
            chunkCount++;
            const elapsed = (performance.now() - startTime) / 1000;
            if (elapsed > 0.1) {
              setStatus(`Generating… ${(chunkCount / elapsed).toFixed(1)} tok/s`);
            }
          }
        }

        const totalSec = ((performance.now() - startTime) / 1000).toFixed(1);
        const tps = (chunkCount / parseFloat(totalSec)).toFixed(1);
        setStatus(`Done — ${chunkCount} tokens · ${totalSec}s · ${tps} tok/s`);

      } catch (err) {
        aiOutput.className = "error";
        aiOutput.textContent = `Error: ${err.message}`;
        setStatus("");
      } finally {
        aiExplainBtn.disabled = false;
      }
    }

    aiExplainBtn.addEventListener("click", runAiExplain);

    // Also clear AI output when the main Clear button is pressed.
    document.getElementById("clear-btn").addEventListener("click", () => {
      aiOutput.className = "empty";
      aiOutput.textContent = "AI explanation will appear here.";
      setStatus("");
      hideProgress();
    });
  </script>
</body>
