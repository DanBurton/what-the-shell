name: Add Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Shell command to add (e.g. grep, find, tar)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  add-command:
    runs-on: ubuntu-latest
    env:
      COMMAND: ${{ inputs.command }}
    steps:
      - name: Validate command input
        run: |
          if ! echo "$COMMAND" | grep -qE '^[a-zA-Z0-9._-]+$'; then
            echo "Error: invalid command name '$COMMAND'. Only letters, digits, '.', '_', and '-' are allowed."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate args file
        run: python3 tools/parse-man.py "$COMMAND"

      - name: Verify output file was created
        run: |
          if [ ! -f "data/${COMMAND}.json" ]; then
            echo "Error: expected output file data/${COMMAND}.json was not created"
            exit 1
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: add-command/${{ inputs.command }}
          title: "Add data for ${{ inputs.command }}"
          body: "Auto-generated args file for `${{ inputs.command }}` from its man page."
          commit-message: "Add data/${{ inputs.command }}.json"
          add-paths: data/${{ inputs.command }}.json
